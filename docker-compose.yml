services:
  redis-dev:
    profiles: ["dev"]
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data_dev:/data
    restart: unless-stopped
    networks:
      - cache_internal_dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend-dev:
    profiles: ["dev"]
    image: sourcebee-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: development
      LOG_LEVEL: ${DEV_LOG_LEVEL:-INFO}
      REDIS_URL: redis://redis-dev:6379/0
      RATE_LIMIT_DEFAULT_PER_MINUTE: ${DEV_RATE_LIMIT_DEFAULT_PER_MINUTE:-120}
      RATE_LIMIT_SSL_PER_MINUTE: ${DEV_RATE_LIMIT_SSL_PER_MINUTE:-30}
      RATE_LIMIT_FILE_PER_MINUTE: ${DEV_RATE_LIMIT_FILE_PER_MINUTE:-30}
      RATE_LIMIT_PDF_PER_MINUTE: ${DEV_RATE_LIMIT_PDF_PER_MINUTE:-15}
      SSL_CACHE_TTL_SECONDS: ${DEV_SSL_CACHE_TTL_SECONDS:-300}
      REQUEST_BODY_MAX_BYTES: ${DEV_REQUEST_BODY_MAX_BYTES:-32768}
      FILE_REQUEST_MAX_BYTES: ${DEV_FILE_REQUEST_MAX_BYTES:-26214400}
      SSL_CONNECT_TIMEOUT_SECONDS: ${DEV_SSL_CONNECT_TIMEOUT_SECONDS:-4}
      SSL_TOTAL_TIMEOUT_SECONDS: ${DEV_SSL_TOTAL_TIMEOUT_SECONDS:-8}
      PDF_MAX_PAGES: ${DEV_PDF_MAX_PAGES:-200}
      PDF_MERGE_MAX_FILES: ${DEV_PDF_MERGE_MAX_FILES:-20}
      IMAGE_MAX_PIXELS: ${DEV_IMAGE_MAX_PIXELS:-40000000}
      IMAGE_MAX_DIMENSION: ${DEV_IMAGE_MAX_DIMENSION:-10000}
      CORS_ALLOWED_ORIGINS: http://localhost:4000
      ANALYTICS_ENABLED: true
      ANALYTICS_INTERNAL_URL: ${DEV_ANALYTICS_INTERNAL_URL:-http://analytics-dev:4100}
      ANALYTICS_TIMEOUT_MS: ${DEV_ANALYTICS_TIMEOUT_MS:-800}
    expose:
      - "8000"
    depends_on:
      redis-dev:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - app_internal_dev
      - cache_internal_dev
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend-dev:
    profiles: ["dev"]
    image: sourcebee-frontend-dev
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      APP_ENV: dev
      NEXT_PUBLIC_APP_ENV: dev
      NEXT_PUBLIC_SITE_URL: http://localhost:4000
      NEXT_PUBLIC_ADS_ENABLED: ${DEV_NEXT_PUBLIC_ADS_ENABLED:-false}
      NEXT_PUBLIC_ANALYTICS_ENABLED: true
      NEXT_PUBLIC_VISITOR_COOKIE_NAME: ${DEV_NEXT_PUBLIC_VISITOR_COOKIE_NAME:-sourcebee_vid}
      NEXT_PUBLIC_VISITOR_COOKIE_MAX_AGE_SECONDS: ${DEV_NEXT_PUBLIC_VISITOR_COOKIE_MAX_AGE_SECONDS:-31536000}
      PORT: 4000
      BACKEND_INTERNAL_URL: http://backend-dev:8000
      ANALYTICS_INTERNAL_URL: ${DEV_ANALYTICS_INTERNAL_URL:-http://analytics-dev:4100}
      ANALYTICS_TIMEOUT_MS: ${DEV_ANALYTICS_TIMEOUT_MS:-800}
      PROXY_TIMEOUT_MS: ${DEV_PROXY_TIMEOUT_MS:-10000}
    ports:
      - "4000:4000"
    depends_on:
      backend-dev:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - app_internal_dev
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000"]
      interval: 20s
      timeout: 5s
      retries: 5

  mongodb-dev:
    profiles: ["dev"]
    image: mongo:7
    volumes:
      - mongodb_data_dev:/data/db
    restart: unless-stopped
    networks:
      - analytics_internal_dev
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-dev:
    profiles: ["dev"]
    image: sourcebee-analytics-dev
    build:
      context: ./analytics
      dockerfile: Dockerfile
    environment:
      APP_ENV: development
      LOG_LEVEL: ${DEV_ANALYTICS_LOG_LEVEL:-INFO}
      MONGODB_URL: ${DEV_MONGODB_URL:-mongodb://mongodb-dev:27017}
      MONGODB_DB_NAME: ${DEV_MONGODB_DB_NAME:-sourcebee_dev_analytics}
      INGEST_MAX_BYTES: ${DEV_ANALYTICS_INGEST_MAX_BYTES:-16384}
      DASHBOARD_DEFAULT_WINDOW_HOURS: ${DEV_ANALYTICS_DASHBOARD_HOURS:-24}
    expose:
      - "4100"
    ports:
      - "127.0.0.1:4100:4100"
    depends_on:
      mongodb-dev:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - app_internal_dev
      - analytics_internal_dev
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4100/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  redis-prod:
    profiles: ["prod"]
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data_prod:/data
    restart: unless-stopped
    networks:
      - cache_internal_prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend-prod:
    profiles: ["prod"]
    image: sourcebee-backend-prod
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      LOG_LEVEL: ${PROD_LOG_LEVEL:-INFO}
      REDIS_URL: redis://redis-prod:6379/0
      RATE_LIMIT_DEFAULT_PER_MINUTE: ${PROD_RATE_LIMIT_DEFAULT_PER_MINUTE:-120}
      RATE_LIMIT_SSL_PER_MINUTE: ${PROD_RATE_LIMIT_SSL_PER_MINUTE:-30}
      RATE_LIMIT_FILE_PER_MINUTE: ${PROD_RATE_LIMIT_FILE_PER_MINUTE:-30}
      RATE_LIMIT_PDF_PER_MINUTE: ${PROD_RATE_LIMIT_PDF_PER_MINUTE:-15}
      SSL_CACHE_TTL_SECONDS: ${PROD_SSL_CACHE_TTL_SECONDS:-300}
      REQUEST_BODY_MAX_BYTES: ${PROD_REQUEST_BODY_MAX_BYTES:-32768}
      FILE_REQUEST_MAX_BYTES: ${PROD_FILE_REQUEST_MAX_BYTES:-26214400}
      SSL_CONNECT_TIMEOUT_SECONDS: ${PROD_SSL_CONNECT_TIMEOUT_SECONDS:-4}
      SSL_TOTAL_TIMEOUT_SECONDS: ${PROD_SSL_TOTAL_TIMEOUT_SECONDS:-8}
      PDF_MAX_PAGES: ${PROD_PDF_MAX_PAGES:-200}
      PDF_MERGE_MAX_FILES: ${PROD_PDF_MERGE_MAX_FILES:-20}
      IMAGE_MAX_PIXELS: ${PROD_IMAGE_MAX_PIXELS:-40000000}
      IMAGE_MAX_DIMENSION: ${PROD_IMAGE_MAX_DIMENSION:-10000}
      CORS_ALLOWED_ORIGINS: ${PROD_CORS_ALLOWED_ORIGINS:-https://sourcebee.org}
      ANALYTICS_ENABLED: true
      ANALYTICS_INTERNAL_URL: ${PROD_ANALYTICS_INTERNAL_URL:-http://analytics-prod:4100}
      ANALYTICS_TIMEOUT_MS: ${PROD_ANALYTICS_TIMEOUT_MS:-800}
    expose:
      - "8000"
    depends_on:
      redis-prod:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - app_internal_prod
      - cache_internal_prod
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend-prod:
    profiles: ["prod"]
    image: sourcebee-frontend-prod
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      APP_ENV: prod
      NEXT_PUBLIC_APP_ENV: prod
      NEXT_PUBLIC_SITE_URL: ${PROD_NEXT_PUBLIC_SITE_URL:-https://sourcebee.org}
      NEXT_PUBLIC_ADS_ENABLED: ${PROD_NEXT_PUBLIC_ADS_ENABLED:-false}
      NEXT_PUBLIC_ANALYTICS_ENABLED: true
      NEXT_PUBLIC_VISITOR_COOKIE_NAME: ${PROD_NEXT_PUBLIC_VISITOR_COOKIE_NAME:-sourcebee_vid}
      NEXT_PUBLIC_VISITOR_COOKIE_MAX_AGE_SECONDS: ${PROD_NEXT_PUBLIC_VISITOR_COOKIE_MAX_AGE_SECONDS:-31536000}
      PORT: 4000
      BACKEND_INTERNAL_URL: http://backend-prod:8000
      ANALYTICS_INTERNAL_URL: ${PROD_ANALYTICS_INTERNAL_URL:-http://analytics-prod:4100}
      ANALYTICS_TIMEOUT_MS: ${PROD_ANALYTICS_TIMEOUT_MS:-800}
      PROXY_TIMEOUT_MS: ${PROD_PROXY_TIMEOUT_MS:-10000}
    ports:
      - "4001:4000"
    depends_on:
      backend-prod:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - app_internal_prod
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000"]
      interval: 20s
      timeout: 5s
      retries: 5

  mongodb-prod:
    profiles: ["prod"]
    image: mongo:7
    volumes:
      - mongodb_data_prod:/data/db
    restart: unless-stopped
    networks:
      - analytics_internal_prod
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-prod:
    profiles: ["prod"]
    image: sourcebee-analytics-prod
    build:
      context: ./analytics
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      LOG_LEVEL: ${PROD_ANALYTICS_LOG_LEVEL:-INFO}
      MONGODB_URL: ${PROD_MONGODB_URL:-mongodb://mongodb-prod:27017}
      MONGODB_DB_NAME: ${PROD_MONGODB_DB_NAME:-sourcebee_prod_analytics}
      INGEST_MAX_BYTES: ${PROD_ANALYTICS_INGEST_MAX_BYTES:-16384}
      DASHBOARD_DEFAULT_WINDOW_HOURS: ${PROD_ANALYTICS_DASHBOARD_HOURS:-24}
    expose:
      - "4100"
    ports:
      - "127.0.0.1:4101:4100"
    depends_on:
      mongodb-prod:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - app_internal_prod
      - analytics_internal_prod
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4100/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  redis_data_dev:
  redis_data_prod:
  mongodb_data_dev:
  mongodb_data_prod:

networks:
  app_internal_dev:
    driver: bridge
  cache_internal_dev:
    driver: bridge
  analytics_internal_dev:
    driver: bridge
  app_internal_prod:
    driver: bridge
  cache_internal_prod:
    driver: bridge
  analytics_internal_prod:
    driver: bridge
